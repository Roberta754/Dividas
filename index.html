<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Dívidas</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* ── LOCK SCREEN ── */
#lockScreen {
  position: fixed; inset: 0; z-index: 999;
  background: #f5f4f0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 32px max(40px, env(safe-area-inset-bottom));
  text-align: center;
}
#lockScreen.hidden { display: none; }
.lock-icon { font-size: 56px; margin-bottom: 20px; line-height: 1; }
.lock-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
.lock-sub { font-size: 14px; color: #888; margin-bottom: 48px; line-height: 1.6; }
.lock-btn {
  background: #a07c2a; color: #fff; border: none;
  padding: 16px; border-radius: 14px; width: 100%; max-width: 280px;
  font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.lock-btn.outline {
  background: transparent; color: #a07c2a;
  border: 1.5px solid #c9a84c; font-size: 13px; padding: 12px;
}
.lock-err { font-size: 13px; color: #a03040; margin-top: 14px; min-height: 18px; }


:root {
  --bg: #f5f4f0;
  --card: #ffffff;
  --card2: #f0efe9;
  --border: #e0ddd5;
  --gold: #a07c2a;
  --gold-light: #b8933a;
  --gold-border: #c9a84c;
  --green: #2d7a52;
  --red: #a03040;
  --text: #1a1a1a;
  --sub: #888880;
  --r: 14px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100dvh;
  padding-bottom: 80px;
  overscroll-behavior: none;
}

/* ── NAV ── */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(245,244,240,.97);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 10px 0 max(10px, env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-item {
  flex: 1; background: none; border: none;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  color: #bbb; font-size: 10px; font-weight: 500;
  cursor: pointer; padding: 2px 0; transition: color .15s;
}
.nav-item.on { color: var(--gold); }
.nav-icon { font-size: 20px; line-height: 1; }

/* ── PAGES ── */
.pg { display: none; animation: fadeIn .15s ease; }
.pg.on { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:none; } }

/* ── HEADER ── */
.pg-header {
  padding: 24px 20px 0;
  display: flex; justify-content: space-between; align-items: center;
}
.pg-title { font-size: 22px; font-weight: 700; color: var(--text); }
.month-nav { display: flex; align-items: center; gap: 8px; }
.mnav-btn {
  background: var(--card); border: 1px solid var(--border);
  color: var(--sub); width: 28px; height: 28px; border-radius: 8px;
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.month-name { font-size: 13px; font-weight: 500; color: var(--sub); min-width: 80px; text-align: center; }

/* ── HERO ── */
.hero { padding: 18px 16px 0; display: flex; gap: 8px; }
.hero-card {
  flex: 1; background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 12px;
}
.hero-card.highlight { border-color: var(--gold-border); }
.hero-label { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 5px; }
.hero-val { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1; }
.hero-val.pos { color: var(--green); }
.hero-val.neg { color: var(--red); }
.hero-val.gold { color: var(--gold); }
.hero-val.sm { font-size: 13px; }

/* progress */
.prog-wrap { padding: 12px 16px 16px; }
.prog-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--sub); margin-bottom: 5px; }
.prog-track { background: var(--border); border-radius: 99px; height: 4px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; background: var(--gold); transition: width .5s cubic-bezier(.4,0,.2,1); }
.prog-fill.warn { background: #c97a2a; }
.prog-fill.danger { background: var(--red); }

/* ── SEGMENT ── */
.seg {
  display: flex; background: var(--card2); border-radius: 10px;
  margin: 0 16px 12px; padding: 3px;
  border: 1px solid var(--border);
}
.seg-btn {
  flex: 1; background: none; border: none; color: var(--sub);
  font-size: 13px; font-weight: 600; padding: 7px 0;
  border-radius: 8px; cursor: pointer; transition: all .15s;
}
.seg-btn.on { background: var(--card); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

/* ── SECTION LABEL ── */
.sec-label {
  font-size: 10px; font-weight: 600; color: var(--sub);
  text-transform: uppercase; letter-spacing: .8px;
  padding: 0 16px; margin-bottom: 8px;
}

/* ── LIST ── */
.list { padding: 0 16px; }

.row {
  background: var(--card);
  border: 1px solid var(--gold-border);
  border-radius: var(--r);
  padding: 13px 12px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px;
  transition: opacity .2s;
}
.row.paid {
  opacity: .5;
  border-color: var(--border);
  background: var(--card2);
}
.row.paid .row-name { text-decoration: line-through; color: var(--sub); }

.row-check {
  width: 22px; height: 22px; border-radius: 6px;
  border: 1.5px solid var(--gold-border);
  flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: all .15s; color: transparent;
  background: transparent;
}
.row-check.done { background: var(--gold); border-color: var(--gold); color: #fff; }

.row-info { flex: 1; min-width: 0; }
.row-name { font-size: 14px; font-weight: 500; color: var(--text); }
.row-sub { font-size: 11px; color: var(--sub); margin-top: 2px; }

.row-val { font-size: 14px; font-weight: 600; flex-shrink: 0; color: var(--text); }
.row-val.paid-val { color: var(--sub); font-weight: 400; font-size: 13px; }

.row-actions { display: flex; gap: 5px; }
.icon-btn {
  background: var(--card2); border: 1px solid var(--border); color: var(--sub);
  width: 26px; height: 26px; border-radius: 6px;
  font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* fixos sem borda dourada */
.row-fixed {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 12px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px;
}

/* ── ADD BTN ── */
.add-row {
  margin: 4px 16px 0;
  background: none; border: 1px dashed var(--border);
  color: var(--sub); width: calc(100% - 32px);
  padding: 11px; border-radius: var(--r);
  font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}

/* ── CARD BLOCK ── */
.card-block {
  background: var(--card);
  border: 1px solid var(--gold-border);
  border-radius: var(--r);
  padding: 15px;
  margin-bottom: 10px;
}
.card-block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-block-name { font-size: 15px; font-weight: 600; color: var(--text); }
.card-tag {
  background: transparent; color: var(--gold);
  border: 1px solid var(--gold-border);
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 99px;
}
.card-info-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; color: var(--text); }
.card-info-row .k { color: var(--sub); }
.card-info-row .v { font-weight: 600; }
.card-prog { background: var(--border); border-radius: 99px; height: 3px; margin-top: 10px; overflow: hidden; }
.card-prog-fill { height: 100%; border-radius: 99px; background: var(--gold); }

/* ── HISTORY ── */
.hist-year {
  font-size: 10px; font-weight: 600; color: var(--sub);
  padding: 0 16px; margin-bottom: 10px; margin-top: 6px;
  display: flex; align-items: center; gap: 8px;
  text-transform: uppercase; letter-spacing: .6px;
}
.hist-year::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.hist-row {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 14px; margin-bottom: 6px;
  display: flex; justify-content: space-between; align-items: center;
}
.hist-month-name { font-size: 14px; font-weight: 500; color: var(--text); }
.hist-right { text-align: right; }
.hist-bal { font-size: 14px; font-weight: 600; }
.hist-bal.pos { color: var(--green); }
.hist-bal.neg { color: var(--red); }
.hist-meta { font-size: 11px; color: var(--sub); margin-top: 2px; }

/* ── SHEET ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.4);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  z-index: 200; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.overlay.on { opacity: 1; pointer-events: all; }
.sheet {
  background: #fff; border-radius: 20px 20px 0 0;
  border-top: 2px solid var(--gold-border);
  width: 100%; padding: 16px 20px max(24px, env(safe-area-inset-bottom));
  transform: translateY(100%); transition: transform .25s cubic-bezier(.4,0,.2,1);
}
.overlay.on .sheet { transform: none; }
.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 16px; }
.sheet-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 10px; color: var(--sub); font-weight: 600; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
.field input, .field select {
  width: 100%; background: var(--card2);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); padding: 12px; font-size: 15px;
  outline: none; -webkit-appearance: none; appearance: none;
}
.field input:focus, .field select:focus { border-color: var(--gold); }

.sheet-btns { display: flex; gap: 10px; margin-top: 16px; }
.btn-cancel {
  flex: 1; background: var(--card2); border: 1px solid var(--border); color: var(--sub);
  padding: 13px; border-radius: 12px; font-size: 15px; cursor: pointer;
}
.btn-save {
  flex: 2; background: var(--gold); border: none; color: #fff;
  padding: 13px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
}

.sal-edit {
  background: none; border: none; color: var(--gold);
  font-size: 12px; font-weight: 500; cursor: pointer; padding: 0;
}

.empty { text-align: center; color: var(--sub); font-size: 13px; padding: 36px 0; }
</style>
</head>
<body>

<!-- ══ LOCK SCREEN ══ -->
<div id="lockScreen">
  <div class="lock-icon">🔐</div>
  <div class="lock-title">Minhas Dívidas</div>
  <div class="lock-sub" id="lockSub">Use o Face ID para
acessar suas finanças.</div>
  <button class="lock-btn" onclick="doAuth()" id="lockBtn">
    <span>😶</span> Entrar com Face ID
  </button>
  <button class="lock-btn outline" id="registerBtn" onclick="doRegister()" style="display:none">
    Cadastrar Face ID
  </button>
  <div class="lock-err" id="lockErr"></div>
</div>

<!-- ══ HOME ══ -->
<div class="pg on" id="pg-home">
  <div class="pg-header">
    <div class="pg-title">Dívidas</div>
    <div class="month-nav">
      <button class="mnav-btn" onclick="chMonth(-1)">‹</button>
      <span class="month-name" id="mLabel"></span>
      <button class="mnav-btn" onclick="chMonth(1)">›</button>
    </div>
  </div>

  <!-- 3 cards: salário / falta pagar / resta pra mim -->
  <div class="hero">
    <div class="hero-card">
      <div class="hero-label">salário</div>
      <div class="hero-val gold sm" id="hSal">R$0</div>
    </div>
    <div class="hero-card highlight">
      <div class="hero-label">falta pagar</div>
      <div class="hero-val" id="hPending">R$0</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">resta pra mim</div>
      <div class="hero-val" id="hBalance">R$0</div>
    </div>
  </div>

  <div class="prog-wrap">
    <div class="prog-meta">
      <span id="hPaidLabel">pago: R$0</span>
      <span id="hPct">0% quitado</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="hBar" style="width:0%"></div></div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin-bottom:10px">
    <div class="sec-label" style="padding:0;margin:0">este mês</div>
    <button class="sal-edit" onclick="openSheet('salSheet')">✏️ salário</button>
  </div>

  <div class="seg">
    <button class="seg-btn on" id="seg-desp" onclick="switchSeg('desp')">Despesas</button>
    <button class="seg-btn" id="seg-fixo" onclick="switchSeg('fixo')">Fixos</button>
  </div>

  <div id="homeList" class="list"></div>
  <button class="add-row" id="homeAddBtn" onclick="openAddHome()">＋ adicionar</button>
</div>

<!-- ══ CARTÕES ══ -->
<div class="pg" id="pg-cards">
  <div class="pg-header" style="margin-bottom:20px">
    <div class="pg-title">Cartões</div>
  </div>
  <div class="list" id="cardList"></div>
  <button class="add-row" onclick="openSheet('cardSheet')">＋ adicionar cartão</button>
</div>

<!-- ══ HISTÓRICO ══ -->
<div class="pg" id="pg-hist">
  <div class="pg-header" style="margin-bottom:20px">
    <div class="pg-title">Histórico</div>
  </div>
  <div id="histList"></div>
</div>

<!-- ══ NAV ══ -->
<nav class="nav">
  <button class="nav-item on" onclick="goPage('home',this)">
    <span class="nav-icon">⊙</span>Início
  </button>
  <button class="nav-item" onclick="goPage('cards',this)">
    <span class="nav-icon">▭</span>Cartões
  </button>
  <button class="nav-item" onclick="goPage('hist',this)">
    <span class="nav-icon">↺</span>Histórico
  </button>
</nav>

<!-- ══ SHEETS ══ -->
<div class="overlay" id="expSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="expSheetTitle">Nova Despesa</div>
    <div class="field"><label>Nome</label><input id="expName" placeholder="Ex: Aluguel, NEON..."></div>
    <div class="field"><label>Valor (R$)</label><input id="expVal" type="number" inputmode="decimal" placeholder="0,00"></div>
    <div class="field"><label>Categoria</label>
      <select id="expCat">
        <option value="Cartão">Cartão</option>
        <option value="Empréstimo">Empréstimo</option>
        <option value="Moradia">Moradia</option>
        <option value="Pessoa">Pessoa</option>
        <option value="Compras">Compras</option>
        <option value="Serviço">Serviço</option>
        <option value="Outros">Outros</option>
      </select>
    </div>
    <div class="sheet-btns">
      <button class="btn-cancel" onclick="closeSheet('expSheet')">Cancelar</button>
      <button class="btn-save" onclick="saveExp()">Salvar</button>
    </div>
  </div>
</div>

<div class="overlay" id="fixSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Gasto Fixo</div>
    <div class="field"><label>Nome</label><input id="fixName" placeholder="Ex: Netflix, Claro..."></div>
    <div class="field"><label>Valor (R$)</label><input id="fixVal" type="number" inputmode="decimal" placeholder="0,00"></div>
    <div class="sheet-btns">
      <button class="btn-cancel" onclick="closeSheet('fixSheet')">Cancelar</button>
      <button class="btn-save" onclick="saveFix()">Salvar</button>
    </div>
  </div>
</div>

<div class="overlay" id="cardSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Cartão / Parcelado</div>
    <div class="field"><label>Nome</label><input id="cName" placeholder="Ex: NEON, Brasil Card..."></div>
    <div class="field"><label>Total da dívida (R$)</label><input id="cTotal" type="number" inputmode="decimal" placeholder="0,00"></div>
    <div class="field"><label>Parcelas restantes</label><input id="cInstalls" type="number" inputmode="numeric" placeholder="Ex: 5"></div>
    <div class="sheet-btns">
      <button class="btn-cancel" onclick="closeSheet('cardSheet')">Cancelar</button>
      <button class="btn-save" onclick="saveCard()">Salvar</button>
    </div>
  </div>
</div>

<div class="overlay" id="salSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Salário do Mês</div>
    <div class="field"><label>Valor líquido (R$)</label><input id="salVal" type="number" inputmode="decimal" placeholder="0,00"></div>
    <div class="sheet-btns">
      <button class="btn-cancel" onclick="closeSheet('salSheet')">Cancelar</button>
      <button class="btn-save" onclick="saveSal()">Salvar</button>
    </div>
  </div>
</div>

<script>
const MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const now=new Date();
let cy=now.getFullYear(), cm=now.getMonth();
let editExpId=null, activeSeg='desp';

function mkey(y,m){ return `d_${y}_${m}`; }
function getMD(y,m){
  const r=localStorage.getItem(mkey(y,m));
  if(r) return JSON.parse(r);
  if(y===2026&&m===5) return {salary:5643.01,expenses:[
    {id:1,name:'NEON',value:2000,cat:'Cartão',paid:false},
    {id:2,name:'Carro',value:1000,cat:'Empréstimo',paid:false},
    {id:3,name:'Empréstimo',value:171,cat:'Empréstimo',paid:false},
    {id:4,name:'Santander',value:200,cat:'Cartão',paid:false},
    {id:5,name:'Letícia',value:466.71,cat:'Pessoa',paid:false},
    {id:6,name:'Compras',value:400,cat:'Compras',paid:false},
    {id:7,name:'Aluguel',value:700,cat:'Moradia',paid:false},
    {id:8,name:'Água',value:100,cat:'Moradia',paid:false},
    {id:9,name:'Net',value:100,cat:'Serviço',paid:false},
    {id:10,name:'Luz',value:150,cat:'Moradia',paid:false},
    {id:11,name:'Shopee',value:350,cat:'Compras',paid:false},
  ]};
  return {salary:0,expenses:[]};
}
function setMD(y,m,d){ localStorage.setItem(mkey(y,m),JSON.stringify(d)); }
function getFixed(){ const r=localStorage.getItem('fx'); if(r) return JSON.parse(r);
  return [{id:1,name:'Netflix',value:50},{id:2,name:'Laser',value:110},{id:3,name:'Claro',value:44},{id:4,name:'Total Pass',value:90},{id:5,name:'YT Premium',value:35},{id:6,name:'Spotify',value:23.9}];
}
function setFixed(f){ localStorage.setItem('fx',JSON.stringify(f)); }
function getCards(){ return JSON.parse(localStorage.getItem('cards')||'[]'); }
function setCards(c){ localStorage.setItem('cards',JSON.stringify(c)); }
function fmt(n){ return 'R$'+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }

// ── NAV ──
function goPage(id,btn){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+id).classList.add('on');
  if(btn) btn.classList.add('on');
  if(id==='cards') renderCards();
  if(id==='hist') renderHist();
}
function chMonth(d){ cm+=d; if(cm<0){cm=11;cy--;} if(cm>11){cm=0;cy++;} renderHome(); }
function switchSeg(s){
  activeSeg=s;
  document.getElementById('seg-desp').classList.toggle('on',s==='desp');
  document.getElementById('seg-fixo').classList.toggle('on',s==='fixo');
  renderHomeList();
}

// ── HOME ──
function renderHome(){
  document.getElementById('mLabel').textContent=MN[cm].slice(0,3)+' '+cy;
  const d=getMD(cy,cm);
  const fx=getFixed();
  const fxTotal=fx.reduce((s,f)=>s+f.value,0);

  const paidExp   = d.expenses.filter(e=>e.paid).reduce((s,e)=>s+e.value,0);
  const pendingExp= d.expenses.filter(e=>!e.paid).reduce((s,e)=>s+e.value,0);
  const totalAll  = d.expenses.reduce((s,e)=>s+e.value,0) + fxTotal;

  // "falta pagar" = o que ainda não foi pago (despesas pendentes + fixos)
  const faltaPagar = pendingExp + fxTotal;

  // "resta pra mim" = salário - tudo que ainda falta pagar
  // (à medida que você tica, faltaPagar cai e resta sobe)
  const resta = d.salary - faltaPagar;

  // barra de progresso = % já pago do total comprometido
  const pct = totalAll>0 ? Math.min(100, Math.round(paidExp/totalAll*100)) : 0;

  document.getElementById('hSal').textContent=fmt(d.salary);
  document.getElementById('hPending').textContent=fmt(faltaPagar);

  const hb=document.getElementById('hBalance');
  hb.textContent=fmt(Math.abs(resta));
  hb.className='hero-val '+(resta>=0?'pos':'neg');

  document.getElementById('hPaidLabel').textContent='pago: '+fmt(paidExp);
  document.getElementById('hPct').textContent=pct+'% quitado';
  const bar=document.getElementById('hBar');
  bar.style.width=pct+'%';
  bar.className='prog-fill'+(pct>90?' danger':pct>60?' warn':'');

  renderHomeList();
}

function renderHomeList(){
  const d=getMD(cy,cm);
  const fx=getFixed();
  let html='';

  if(activeSeg==='desp'){
    if(!d.expenses.length){
      html='<div class="empty">Nenhuma despesa este mês</div>';
    } else {
      // pendentes primeiro, pagas embaixo
      const sorted=[...d.expenses.filter(e=>!e.paid),...d.expenses.filter(e=>e.paid)];
      sorted.forEach(e=>{
        html+=`<div class="row ${e.paid?'paid':''}">
          <div class="row-check ${e.paid?'done':''}" onclick="toggleExp(${e.id})">${e.paid?'✓':''}</div>
          <div class="row-info">
            <div class="row-name">${e.name}</div>
            <div class="row-sub">${e.cat}</div>
          </div>
          <div class="row-val ${e.paid?'paid-val':''}">${fmt(e.value)}</div>
          <div class="row-actions">
            <button class="icon-btn" onclick="editExp(${e.id})">✏️</button>
            <button class="icon-btn" onclick="delExp(${e.id})">✕</button>
          </div>
        </div>`;
      });
    }
    document.getElementById('homeAddBtn').onclick=()=>openSheet('expSheet');
  } else {
    if(!fx.length){
      html='<div class="empty">Nenhum fixo cadastrado</div>';
    } else {
      fx.forEach((f,i)=>{
        html+=`<div class="row-fixed">
          <div class="row-info"><div class="row-name" style="color:var(--text)">${f.name}</div></div>
          <div class="row-val">${fmt(f.value)}</div>
          <div class="row-actions">
            <button class="icon-btn" onclick="delFix(${i})">✕</button>
          </div>
        </div>`;
      });
      const total=fx.reduce((s,f)=>s+f.value,0);
      html+=`<div style="display:flex;justify-content:space-between;padding:10px 4px 0;font-size:12px;color:var(--sub)">
        <span>Total fixo</span><strong style="color:var(--text)">${fmt(total)}</strong>
      </div>`;
    }
    document.getElementById('homeAddBtn').onclick=()=>openSheet('fixSheet');
  }
  document.getElementById('homeList').innerHTML=html;
}

function openAddHome(){ if(activeSeg==='desp') openSheet('expSheet'); else openSheet('fixSheet'); }

function toggleExp(id){
  const d=getMD(cy,cm);
  const e=d.expenses.find(x=>x.id===id);
  if(e){ e.paid=!e.paid; setMD(cy,cm,d); renderHome(); }
}
function delExp(id){
  const d=getMD(cy,cm);
  d.expenses=d.expenses.filter(x=>x.id!==id);
  setMD(cy,cm,d); renderHome();
}
function editExp(id){
  const d=getMD(cy,cm);
  const e=d.expenses.find(x=>x.id===id);
  if(!e) return;
  editExpId=id;
  document.getElementById('expName').value=e.name;
  document.getElementById('expVal').value=e.value;
  document.getElementById('expCat').value=e.cat;
  document.getElementById('expSheetTitle').textContent='Editar Despesa';
  openSheet('expSheet');
}
function delFix(i){ const fx=getFixed();fx.splice(i,1);setFixed(fx);renderHomeList(); }

// ── CARDS ──
function renderCards(){
  const cards=getCards();
  if(!cards.length){ document.getElementById('cardList').innerHTML='<div class="empty">Nenhum cartão</div>'; return; }
  document.getElementById('cardList').innerHTML=cards.map((c,i)=>{
    const inst=c.total/c.installs;
    return `<div class="card-block">
      <div class="card-block-header">
        <div class="card-block-name">${c.name}</div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="card-tag">${c.installs}x</span>
          <button class="icon-btn" onclick="delCard(${i})">✕</button>
        </div>
      </div>
      <div class="card-info-row"><span class="k">Total</span><span class="v" style="color:var(--red)">${fmt(c.total)}</span></div>
      <div class="card-info-row"><span class="k">Parcela mensal</span><span class="v">${fmt(inst)}</span></div>
      <div class="card-prog"><div class="card-prog-fill" style="width:${Math.round(100/c.installs)}%"></div></div>
    </div>`;
  }).join('');
}
function delCard(i){ const c=getCards();c.splice(i,1);setCards(c);renderCards(); }

// ── HISTORY ──
function renderHist(){
  const years=[2026,2025,2024,2023,2022];
  const fx=getFixed();
  const fxTotal=fx.reduce((s,f)=>s+f.value,0);
  let html='';
  years.forEach(y=>{
    let rows='',any=false;
    for(let m=11;m>=0;m--){
      let d=null;
      if(y===2026&&m===5) d=getMD(y,m);
      else { const r=localStorage.getItem(mkey(y,m)); if(r) d=JSON.parse(r); }
      if(!d) continue;
      any=true;
      const expT=d.expenses.reduce((s,e)=>s+e.value,0);
      const total=expT+fxTotal;
      const bal=d.salary-total;
      rows+=`<div class="hist-row">
        <span class="hist-month-name">${MN[m]}</span>
        <div class="hist-right">
          <div class="hist-bal ${bal>=0?'pos':'neg'}">${fmt(bal)}</div>
          <div class="hist-meta">${fmt(d.salary)} · ${fmt(total)}</div>
        </div>
      </div>`;
    }
    if(any||y>=cy){
      html+=`<div style="padding:0 16px">
        <div class="hist-year">${y}</div>
        ${rows||'<div class="empty" style="padding:16px 0">Sem dados</div>'}
      </div>`;
    }
  });
  document.getElementById('histList').innerHTML=html;
}

// ── SHEETS ──
function openSheet(id){ document.getElementById(id).classList.add('on'); }
function closeSheet(id){
  document.getElementById(id).classList.remove('on');
  editExpId=null;
  document.getElementById('expSheetTitle').textContent='Nova Despesa';
}
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('on'); });
});

function saveExp(){
  const name=document.getElementById('expName').value.trim();
  const val=parseFloat(document.getElementById('expVal').value);
  const cat=document.getElementById('expCat').value;
  if(!name||isNaN(val)||val<=0) return;
  const d=getMD(cy,cm);
  if(editExpId){ const e=d.expenses.find(x=>x.id===editExpId); if(e){e.name=name;e.value=val;e.cat=cat;} }
  else d.expenses.push({id:Date.now(),name,value:val,cat,paid:false});
  setMD(cy,cm,d);
  closeSheet('expSheet');
  document.getElementById('expName').value='';
  document.getElementById('expVal').value='';
  renderHome();
}
function saveFix(){
  const name=document.getElementById('fixName').value.trim();
  const val=parseFloat(document.getElementById('fixVal').value);
  if(!name||isNaN(val)||val<=0) return;
  const fx=getFixed(); fx.push({id:Date.now(),name,value:val}); setFixed(fx);
  closeSheet('fixSheet');
  document.getElementById('fixName').value='';
  document.getElementById('fixVal').value='';
  renderHomeList();
}
function saveCard(){
  const name=document.getElementById('cName').value.trim();
  const total=parseFloat(document.getElementById('cTotal').value);
  const inst=parseInt(document.getElementById('cInstalls').value);
  if(!name||isNaN(total)||isNaN(inst)||inst<1) return;
  const c=getCards(); c.push({name,total,installs:inst}); setCards(c);
  closeSheet('cardSheet');
  document.getElementById('cName').value='';
  document.getElementById('cTotal').value='';
  document.getElementById('cInstalls').value='';
  renderCards();
}
function saveSal(){
  const v=parseFloat(document.getElementById('salVal').value);
  if(isNaN(v)||v<0) return;
  const d=getMD(cy,cm); d.salary=v; setMD(cy,cm,d);
  closeSheet('salSheet'); renderHome();
}

renderHome();

// ── WEBAUTHN / FACE ID ──
const RP_ID = location.hostname || 'localhost';
const RP_NAME = 'Minhas Dívidas';

function b64url(buf){
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function fromB64url(s){
  s=s.replace(/-/g,'+').replace(/_/g,'/');
  return Uint8Array.from(atob(s),c=>c.charCodeAt(0));
}

function getCredId(){ return localStorage.getItem('faceCredId'); }
function saveCredId(id){ localStorage.setItem('faceCredId', id); }

async function doRegister(){
  const err=document.getElementById('lockErr');
  err.textContent='';
  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const userId = crypto.getRandomValues(new Uint8Array(16));
    const cred = await navigator.credentials.create({ publicKey: {
      challenge,
      rp: { id: RP_ID, name: RP_NAME },
      user: { id: userId, name: 'usuario', displayName: 'Usuária' },
      pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
      authenticatorSelection: {
        authenticatorAttachment: 'platform',
        userVerification: 'required'
      },
      timeout: 60000,
      attestation: 'none'
    }});
    saveCredId(b64url(cred.rawId));
    unlock();
  } catch(e) {
    err.textContent = 'Erro ao cadastrar: ' + e.message;
  }
}

async function doAuth(){
  const err=document.getElementById('lockErr');
  err.textContent='';
  const credId = getCredId();
  if(!credId){
    // first time — show register button
    document.getElementById('lockBtn').style.display='none';
    document.getElementById('registerBtn').style.display='flex';
    document.getElementById('lockSub').textContent='Primeiro acesso: cadastre seu Face ID para proteger o app.';
    return;
  }
  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    await navigator.credentials.get({ publicKey: {
      challenge,
      rpId: RP_ID,
      allowCredentials: [{ type: 'public-key', id: fromB64url(credId) }],
      userVerification: 'required',
      timeout: 60000
    }});
    unlock();
  } catch(e) {
    if(e.name === 'NotAllowedError'){
      err.textContent = 'Face ID não reconhecido.';
    } else {
      err.textContent = 'Erro: ' + e.message;
    }
  }
}

function unlock(){
  document.getElementById('lockScreen').classList.add('hidden');
}

// on load: check if cred exists
(function init(){
  if(!window.PublicKeyCredential){
    // WebAuthn not supported — skip lock
    unlock();
    return;
  }
  const credId = getCredId();
  if(!credId){
    document.getElementById('lockBtn').style.display='none';
    document.getElementById('registerBtn').style.display='flex';
    document.getElementById('lockSub').textContent='Primeiro acesso: cadastre seu Face ID para proteger o app.';
  }
  // lock screen stays visible — user must auth
})();
</script>
