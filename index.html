<meta name="theme-color" content="#f5f4f0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* LOCK SCREEN */
#lockScreen {
  position:fixed; inset:0; z-index:999; background:#f5f4f0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:40px 32px max(40px,env(safe-area-inset-bottom)); text-align:center;
}
#lockScreen.hidden { display:none; }
.lock-icon { font-size:56px; margin-bottom:20px; line-height:1; }
.lock-title { font-size:22px; font-weight:700; color:#1a1a1a; margin-bottom:8px; }
.lock-sub { font-size:14px; color:#888; margin-bottom:48px; line-height:1.6; }
.lock-btn {
  background:#a07c2a; color:#fff; border:none; padding:16px;
  border-radius:14px; width:100%; max-width:280px; font-size:16px; font-weight:600;
  cursor:pointer; margin-bottom:12px; display:flex; align-items:center; justify-content:center; gap:8px;
}
.lock-btn.outline { background:transparent; color:#a07c2a; border:1.5px solid #c9a84c; font-size:13px; padding:12px; }
.lock-err { font-size:13px; color:#a03040; margin-top:14px; min-height:18px; }

:root {
  --bg: #f5f4f0; --card: #fff; --card2: #f0efe9; --border: #e0ddd5;
  --gold: #a07c2a; --gold-light: #b8933a; --gold-border: #c9a84c;
  --green: #2d7a52; --red: #a03040; --text: #1a1a1a; --sub: #888880; --r: 14px;
}
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,sans-serif; min-height:100dvh; padding-bottom:80px; overscroll-behavior:none; user-select:none; }

/* NAV */
.nav { position:fixed; bottom:0; left:0; right:0; background:rgba(245,244,240,.97); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:1px solid var(--border); display:flex; padding:10px 0 max(10px,env(safe-area-inset-bottom)); z-index:100; }
.nav-item { flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:3px; color:#bbb; font-size:10px; font-weight:500; cursor:pointer; padding:2px 0; transition:color .15s; }
.nav-item.on { color:var(--gold); }
.nav-icon { font-size:20px; line-height:1; }

/* PAGES */
.pg { display:none; animation:fadeIn .15s ease; }
.pg.on { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }

/* WELCOME */
#pgWelcome { min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 0 max(40px,env(safe-area-inset-bottom)); background:var(--bg); }
#pgWelcome.hidden { display:none; }
.welcome-top { text-align:center; margin-bottom:48px; }
.welcome-icon { font-size:52px; margin-bottom:12px; }
.welcome-title { font-size:24px; font-weight:700; color:var(--text); }
.welcome-sub { font-size:13px; color:var(--sub); margin-top:4px; }

/* PICKER - native scroll */
.picker-wrap { display:flex; align-items:center; gap:0; position:relative; margin-bottom:40px; }
.picker-col {
  width:140px; height:210px; overflow:hidden; position:relative;
  touch-action:none;
}
.picker-list { display:flex; flex-direction:column; position:relative; }
.picker-item {
  height:42px; min-height:42px; max-height:42px; display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:500; color:var(--sub);
  flex-shrink:0;
  transition:color .15s, transform .15s;
  transform:scale(1);
}
.picker-item.sel { color:var(--text); font-weight:700; transform:scale(1.18); }
.picker-col::before,.picker-col::after { content:""; position:absolute; left:0; right:0; height:84px; z-index:2; pointer-events:none; }
.picker-col::before { top:0; background:linear-gradient(to bottom,var(--bg) 40%,rgba(245,244,240,0) 100%); }
.picker-col::after  { bottom:0; background:linear-gradient(to top,var(--bg) 40%,rgba(245,244,240,0) 100%); }
.picker-sel { position:absolute; left:8px; right:8px; top:84px; height:42px; border-top:1.5px solid var(--gold-border); border-bottom:1.5px solid var(--gold-border); pointer-events:none; z-index:3; }
.picker-div { width:1px; height:120px; background:var(--border); margin:0 4px; }
.picker-enter { background:var(--gold); color:#fff; border:none; padding:15px 60px; border-radius:14px; font-size:16px; font-weight:700; cursor:pointer; }

/* HEADER */
.pg-header { padding:20px 20px 0; display:flex; justify-content:space-between; align-items:center; }
.pg-title { font-size:22px; font-weight:700; }
.pg-back { background:none; border:none; color:var(--gold); font-size:13px; font-weight:600; cursor:pointer; padding:0; }
.sal-edit { background:none; border:none; color:var(--gold); font-size:12px; font-weight:500; cursor:pointer; padding:0; }

/* HERO */
.hero { padding:14px 16px 0; display:flex; gap:8px; }
.hero-card { flex:1; background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:12px 10px; }
.hero-card.hl { border-color:var(--gold-border); }
.hero-label { font-size:9px; color:var(--sub); text-transform:uppercase; letter-spacing:.6px; margin-bottom:4px; }
.hero-val { font-size:14px; font-weight:700; color:var(--text); line-height:1; }
.hero-val.pos { color:var(--green); }
.hero-val.neg { color:var(--red); }
.hero-val.gold { color:var(--gold); }

/* PROGRESS */
.prog-wrap { padding:10px 16px 14px; }
.prog-meta { display:flex; justify-content:space-between; font-size:11px; color:var(--sub); margin-bottom:5px; }
.prog-track { background:var(--border); border-radius:99px; height:4px; overflow:hidden; }
.prog-fill { height:100%; border-radius:99px; background:var(--gold); transition:width .5s; }
.prog-fill.warn { background:#c97a2a; }
.prog-fill.danger { background:var(--red); }

/* SEG */
.seg { display:flex; background:var(--card2); border-radius:10px; margin:0 16px 12px; padding:3px; border:1px solid var(--border); }
.seg-btn { flex:1; background:none; border:none; color:var(--sub); font-size:13px; font-weight:600; padding:7px 0; border-radius:8px; cursor:pointer; transition:all .15s; }
.seg-btn.on { background:var(--card); color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.08); }

/* LIST */
.list { padding:0 16px; }
.row { background:var(--card); border:1px solid var(--gold-border); border-radius:var(--r); padding:13px 12px; display:flex; align-items:center; gap:10px; margin-bottom:8px; transition:opacity .2s; }
.row.paid { opacity:.45; border-color:var(--border); background:var(--card2); }
.row.paid .row-name { text-decoration:line-through; color:var(--sub); }
.row-check { width:22px; height:22px; border-radius:6px; border:1.5px solid var(--gold-border); flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:12px; color:transparent; transition:all .15s; }
.row-check.done { background:var(--gold); border-color:var(--gold); color:#fff; }
.row-info { flex:1; min-width:0; }
.row-name { font-size:14px; font-weight:500; }
.row-sub { font-size:11px; color:var(--sub); margin-top:2px; }
.row-val { font-size:14px; font-weight:600; flex-shrink:0; }
.row-val.paid-val { color:var(--sub); font-weight:400; font-size:13px; }
.row-actions { display:flex; gap:5px; }
.icon-btn { background:var(--card2); border:1px solid var(--border); color:var(--sub); width:28px; height:28px; border-radius:6px; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.row-fixed { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:12px 12px; display:flex; align-items:center; gap:10px; margin-bottom:8px; }

/* UNDO BAR */
.undo-bar { position:fixed; bottom:90px; left:16px; right:16px; background:#1a1a1a; color:#fff; border-radius:12px; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; font-size:13px; z-index:50; transform:translateY(20px); opacity:0; transition:all .25s cubic-bezier(.4,0,.2,1); pointer-events:none; }
.undo-bar.show { transform:none; opacity:1; pointer-events:all; }
.undo-btn { background:none; border:none; color:var(--gold-border); font-size:13px; font-weight:700; cursor:pointer; padding:0; }

/* ADD */
.add-row { margin:4px 16px 0; background:none; border:1px dashed var(--border); color:var(--sub); width:calc(100% - 32px); padding:11px; border-radius:var(--r); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }

/* CARDS */
.card-block { background:var(--card); border:1px solid var(--gold-border); border-radius:var(--r); padding:15px; margin-bottom:10px; }
.card-block-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.card-block-name { font-size:15px; font-weight:600; }
.card-tag { background:transparent; color:var(--gold); border:1px solid var(--gold-border); font-size:10px; font-weight:600; padding:2px 8px; border-radius:99px; }
.card-info-row { display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px; }
.card-info-row .k { color:var(--sub); }
.card-info-row .v { font-weight:600; }
.card-prog { background:var(--border); border-radius:99px; height:3px; margin-top:10px; overflow:hidden; }
.card-prog-fill { height:100%; border-radius:99px; background:var(--gold); }

/* HISTORY */
.hist-year { font-size:10px; font-weight:600; color:var(--sub); padding:0 16px; margin-bottom:10px; margin-top:6px; display:flex; align-items:center; gap:8px; text-transform:uppercase; letter-spacing:.6px; }
.hist-year::after { content:""; flex:1; height:1px; background:var(--border); }
.hist-row { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }
.hist-month-name { font-size:14px; font-weight:500; }
.hist-right { text-align:right; }
.hist-bal { font-size:14px; font-weight:600; }
.hist-bal.pos { color:var(--green); }
.hist-bal.neg { color:var(--red); }
.hist-meta { font-size:11px; color:var(--sub); margin-top:2px; }

/* SHEET */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); z-index:200; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .2s; }
.overlay.on { opacity:1; pointer-events:all; }
.sheet { background:#fff; border-radius:20px 20px 0 0; border-top:2px solid var(--gold-border); width:100%; padding:16px 20px max(24px,env(safe-area-inset-bottom)); transform:translateY(100%); transition:transform .25s cubic-bezier(.4,0,.2,1); }
.overlay.on .sheet { transform:none; }
.sheet-handle { width:36px; height:4px; background:var(--border); border-radius:99px; margin:0 auto 16px; }
.sheet-title { font-size:16px; font-weight:700; margin-bottom:16px; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:10px; color:var(--sub); font-weight:600; margin-bottom:5px; text-transform:uppercase; letter-spacing:.4px; }
.field input,.field select { width:100%; background:var(--card2); border:1px solid var(--border); border-radius:10px; color:var(--text); padding:12px; font-size:15px; outline:none; -webkit-appearance:none; appearance:none; }
.field input:focus,.field select:focus { border-color:var(--gold); }
.sheet-btns { display:flex; gap:10px; margin-top:16px; }
.btn-cancel { flex:1; background:var(--card2); border:1px solid var(--border); color:var(--sub); padding:13px; border-radius:12px; font-size:15px; cursor:pointer; }
.btn-save { flex:2; background:var(--gold); border:none; color:#fff; padding:13px; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; }
.empty { text-align:center; color:var(--sub); font-size:13px; padding:36px 0; }
</style>
</head>

<script>
const MN=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const YEARS=[2022,2023,2024,2025,2026,2027,2028];
const now=new Date();
let cy=now.getFullYear(), cm=now.getMonth();
let editExpId=null, activeSeg='desp';
let undoStack=null, undoTimer=null;
let pickerMIdx=cm, pickerYIdx=YEARS.indexOf(cy);
if(pickerYIdx<0) pickerYIdx=YEARS.length-2;
let setMP, setYP;

function buildPicker(listEl, colEl, items, selIdx, onSel) {
  const IH = 42;
  const PAD = 2; // padding items top/bottom so list can show 5 visible rows
  const padded = Array(PAD).fill('').concat(items).concat(Array(PAD).fill(''));
  listEl.innerHTML = padded.map((t,i) => '<div class="picker-item">'+t+'</div>').join('');
  const itemEls = Array.from(listEl.querySelectorAll('.picker-item'));
  let cur = selIdx; // real index into items (0-based, ignoring padding)

  function render() {
    listEl.style.transform = 'translateY(' + (-cur * IH) + 'px)';
    itemEls.forEach((el, i) => {
      const realIdx = i - PAD;
      el.className = (realIdx === cur) ? 'picker-item sel' : 'picker-item';
    });
  }

  function setIdx(idx) {
    cur = Math.max(0, Math.min(items.length - 1, idx));
    render();
    onSel(cur);
  }

  // Discrete drag: every 42px of finger movement = exactly 1 step
  let startY = 0, startCur = 0, dragging = false, accumSteps = 0;

  colEl.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    startCur = cur;
    accumSteps = 0;
    dragging = true;
    listEl.style.transition = 'none';
    e.preventDefault();
  }, {passive:false});

  colEl.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dy = startY - e.touches[0].clientY;
    const steps = Math.round(dy / IH);
    if (steps !== accumSteps) {
      accumSteps = steps;
      const newIdx = Math.max(0, Math.min(items.length - 1, startCur + steps));
      if (newIdx !== cur) {
        cur = newIdx;
        render();
        onSel(cur);
      }
    }
    e.preventDefault();
  }, {passive:false});

  colEl.addEventListener('touchend', () => {
    dragging = false;
    listEl.style.transition = 'transform .2s cubic-bezier(.25,.8,.5,1)';
    render(); // ensure final snap to exact position
  });

  function goTo(idx) {
    setIdx(idx);
  }

  render();
  onSel(cur);
  return goTo;
}

function initPickers() {
  setMP = buildPicker(
    document.getElementById('pickerMonthList'),
    document.getElementById('pickerMonth'),
    MN, pickerMIdx, i => { pickerMIdx = i; }
  );
  setYP = buildPicker(
    document.getElementById('pickerYearList'),
    document.getElementById('pickerYear'),
    YEARS.map(String), pickerYIdx, i => { pickerYIdx = i; }
  );
}

function enterMonth() {
  cm = pickerMIdx;
  cy = YEARS[pickerYIdx];
  document.getElementById('pgWelcome').classList.add('hidden');
  document.getElementById('pg-home').classList.add('on');
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('on'));
  document.querySelector('.nav-item').classList.add('on');
  renderHome();
}

function goWelcome() {
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('on'));
  document.querySelector('.nav-item').classList.add('on');
  document.getElementById('pgWelcome').classList.remove('hidden');
  pickerMIdx=cm; pickerYIdx=YEARS.indexOf(cy); if(pickerYIdx<0)pickerYIdx=0;
  setMP(pickerMIdx); setYP(pickerYIdx);
}

function goPage(id,btn){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('on'));
  document.getElementById('pgWelcome').classList.add('hidden');
  document.getElementById('pg-'+id).classList.add('on');
  if(btn)btn.classList.add('on');
  if(id==='cards')renderCards();
  if(id==='hist')renderHist();
}

function switchSeg(s){
  activeSeg=s;
  document.getElementById('seg-desp').classList.toggle('on',s==='desp');
  document.getElementById('seg-fixo').classList.toggle('on',s==='fixo');
  renderHomeList();
}

function mkey(y,m){return 'd_'+y+'_'+m;}
function getMD(y,m){
  const r=localStorage.getItem(mkey(y,m));
  if(r) return JSON.parse(r);
  if(y===2026&&m===5) return {salary:5643.01,expenses:[
    {id:1,name:'NEON',value:2000,cat:'Cartao',paid:false},
    {id:2,name:'Carro',value:1000,cat:'Emprestimo',paid:false},
    {id:3,name:'Emprestimo',value:171,cat:'Emprestimo',paid:false},
    {id:4,name:'Santander',value:200,cat:'Cartao',paid:false},
    {id:5,name:'Leticia',value:466.71,cat:'Pessoa',paid:false},
    {id:6,name:'Compras',value:400,cat:'Compras',paid:false},
    {id:7,name:'Aluguel',value:700,cat:'Moradia',paid:false},
    {id:8,name:'Agua',value:100,cat:'Moradia',paid:false},
    {id:9,name:'Net',value:100,cat:'Servico',paid:false},
    {id:10,name:'Luz',value:150,cat:'Moradia',paid:false},
    {id:11,name:'Shopee',value:350,cat:'Compras',paid:false},
  ]};
  return {salary:0,expenses:[]};
}
function setMD(y,m,d){localStorage.setItem(mkey(y,m),JSON.stringify(d));}
function getFixed(){const r=localStorage.getItem('fx');if(r)return JSON.parse(r);return[{id:1,name:'Netflix',value:50},{id:2,name:'Laser',value:110},{id:3,name:'Claro',value:44},{id:4,name:'Total Pass',value:90},{id:5,name:'YT Premium',value:35},{id:6,name:'Spotify',value:23.9}];}
function setFixed(f){localStorage.setItem('fx',JSON.stringify(f));}
function getCards(){return JSON.parse(localStorage.getItem('cards')||'[]');}
function setCards(c){localStorage.setItem('cards',JSON.stringify(c));}
function fmt(n){return 'R$'+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}

function pushUndo(msg,fn){
  undoStack=fn; clearTimeout(undoTimer);
  document.getElementById('undoMsg').textContent=msg;
  document.getElementById('undoBar').classList.add('show');
  undoTimer=setTimeout(()=>{document.getElementById('undoBar').classList.remove('show');undoStack=null;},4000);
}
function doUndo(){if(undoStack){undoStack();undoStack=null;}clearTimeout(undoTimer);document.getElementById('undoBar').classList.remove('show');}

function renderHome(){
  document.getElementById('homeTitle').textContent=MN[cm]+' '+cy;
  const d=getMD(cy,cm),fx=getFixed();
  const fxT=fx.reduce((s,f)=>s+f.value,0);
  const paid=d.expenses.filter(e=>e.paid).reduce((s,e)=>s+e.value,0);
  const pend=d.expenses.filter(e=>!e.paid).reduce((s,e)=>s+e.value,0);
  const totAll=d.expenses.reduce((s,e)=>s+e.value,0)+fxT;
  const falta=pend+fxT;
  const resta=d.salary-falta;
  const pct=totAll>0?Math.min(100,Math.round(paid/totAll*100)):0;
  document.getElementById('hSal').textContent=fmt(d.salary);
  document.getElementById('hPending').textContent=fmt(falta);
  const hb=document.getElementById('hBalance');
  hb.textContent=fmt(Math.abs(resta)); hb.className='hero-val '+(resta>=0?'pos':'neg');
  document.getElementById('hPaidLabel').textContent='pago: '+fmt(paid);
  document.getElementById('hPct').textContent=pct+'% quitado';
  const bar=document.getElementById('hBar');
  bar.style.width=pct+'%'; bar.className='prog-fill'+(pct>90?' danger':pct>60?' warn':'');
  renderHomeList();
}

function renderHomeList(){
  const d=getMD(cy,cm),fx=getFixed();
  let html='';
  if(activeSeg==='desp'){
    if(!d.expenses.length){html='<div class="empty">Nenhuma despesa este mes</div>';}
    else{
      [...d.expenses.filter(e=>!e.paid),...d.expenses.filter(e=>e.paid)].forEach(e=>{
        html+='<div class="row '+(e.paid?'paid':'')+'"><div class="row-check '+(e.paid?'done':'')+'" onclick="toggleExp('+e.id+')">'+(e.paid?'&#10003;':'')+'</div><div class="row-info"><div class="row-name">'+e.name+'</div><div class="row-sub">'+e.cat+'</div></div><div class="row-val '+(e.paid?'paid-val':'')+'">'+fmt(e.value)+'</div><div class="row-actions"><button class="icon-btn" onclick="editExp('+e.id+')">&#9998;</button><button class="icon-btn" onclick="delExp('+e.id+')">&#10005;</button></div></div>';
      });
    }
    document.getElementById('homeAddBtn').onclick=()=>openSheet('expSheet');
  } else {
    if(!fx.length){html='<div class="empty">Nenhum fixo cadastrado</div>';}
    else{
      fx.forEach((f,i)=>{html+='<div class="row-fixed"><div class="row-info"><div class="row-name">'+f.name+'</div></div><div class="row-val">'+fmt(f.value)+'</div><div class="row-actions"><button class="icon-btn" onclick="delFix('+i+')">&#10005;</button></div></div>';});
      html+='<div style="display:flex;justify-content:space-between;padding:10px 4px 0;font-size:12px;color:var(--sub)"><span>Total fixo</span><strong style="color:var(--text)">'+fmt(fx.reduce((s,f)=>s+f.value,0))+'</strong></div>';
    }
    document.getElementById('homeAddBtn').onclick=()=>openSheet('fixSheet');
  }
  document.getElementById('homeList').innerHTML=html;
}

function openAddHome(){if(activeSeg==='desp')openSheet('expSheet');else openSheet('fixSheet');}

function toggleExp(id){
  const d=getMD(cy,cm),e=d.expenses.find(x=>x.id===id); if(!e)return;
  const prev=e.paid; e.paid=!e.paid; setMD(cy,cm,d); renderHome();
  pushUndo('"'+e.name+'" '+(e.paid?'marcado como pago':'desmarcado'),()=>{const d2=getMD(cy,cm),e2=d2.expenses.find(x=>x.id===id);if(e2){e2.paid=prev;setMD(cy,cm,d2);renderHome();}});
}
function delExp(id){
  const d=getMD(cy,cm),e=d.expenses.find(x=>x.id===id); if(!e)return;
  const snap=JSON.stringify(d); d.expenses=d.expenses.filter(x=>x.id!==id); setMD(cy,cm,d); renderHome();
  pushUndo('"'+e.name+'" excluido',()=>{setMD(cy,cm,JSON.parse(snap));renderHome();});
}
function editExp(id){
  const d=getMD(cy,cm),e=d.expenses.find(x=>x.id===id); if(!e)return;
  editExpId=id; document.getElementById('expName').value=e.name; document.getElementById('expVal').value=e.value; document.getElementById('expCat').value=e.cat;
  document.getElementById('expSheetTitle').textContent='Editar Despesa'; openSheet('expSheet');
}
function delFix(i){
  const fx=getFixed(),f=fx[i],snap=JSON.stringify(fx); fx.splice(i,1); setFixed(fx); renderHomeList();
  pushUndo('"'+f.name+'" removido dos fixos',()=>{setFixed(JSON.parse(snap));renderHomeList();});
}

function renderCards(){
  const cards=getCards();
  if(!cards.length){document.getElementById('cardList').innerHTML='<div class="empty">Nenhum cartao</div>';return;}
  document.getElementById('cardList').innerHTML=cards.map((c,i)=>'<div class="card-block"><div class="card-block-header"><div class="card-block-name">'+c.name+'</div><div style="display:flex;gap:8px;align-items:center"><span class="card-tag">'+c.installs+'x</span><button class="icon-btn" onclick="delCard('+i+')">&#10005;</button></div></div><div class="card-info-row"><span class="k">Total</span><span class="v" style="color:var(--red)">'+fmt(c.total)+'</span></div><div class="card-info-row"><span class="k">Parcela mensal</span><span class="v">'+fmt(c.total/c.installs)+'</span></div><div class="card-prog"><div class="card-prog-fill" style="width:'+Math.round(100/c.installs)+'%"></div></div></div>').join('');
}
function delCard(i){const c=getCards(),snap=JSON.stringify(c),name=c[i].name;c.splice(i,1);setCards(c);renderCards();pushUndo('"'+name+'" removido',()=>{setCards(JSON.parse(snap));renderCards();});}

function renderHist(){
  const years=[2028,2027,2026,2025,2024,2023,2022];
  const fx=getFixed(),fxT=fx.reduce((s,f)=>s+f.value,0);
  let html='';
  years.forEach(y=>{
    let rows='',any=false;
    for(let m=11;m>=0;m--){
      let d=null;
      if(y===2026&&m===5)d=getMD(y,m);
      else{const r=localStorage.getItem(mkey(y,m));if(r)d=JSON.parse(r);}
      if(!d)continue; any=true;
      const tot=d.expenses.reduce((s,e)=>s+e.value,0)+fxT,bal=d.salary-tot;
      rows+='<div class="hist-row"><span class="hist-month-name">'+MN[m]+'</span><div class="hist-right"><div class="hist-bal '+(bal>=0?'pos':'neg')+'">'+fmt(bal)+'</div><div class="hist-meta">'+fmt(d.salary)+' &middot; '+fmt(tot)+'</div></div></div>';
    }
    if(any)html+='<div style="padding:0 16px"><div class="hist-year">'+y+'</div>'+rows+'</div>';
  });
  if(!html)html='<div class="empty">Sem historico ainda</div>';
  document.getElementById('histList').innerHTML=html;
}

function openSheet(id){document.getElementById(id).classList.add('on');}
function closeSheet(id){document.getElementById(id).classList.remove('on');editExpId=null;document.getElementById('expSheetTitle').textContent='Nova Despesa';}
document.querySelectorAll('.overlay').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('on');});});

function saveExp(){
  const name=document.getElementById('expName').value.trim(),val=parseFloat(document.getElementById('expVal').value),cat=document.getElementById('expCat').value;
  if(!name||isNaN(val)||val<=0)return;
  const d=getMD(cy,cm),snap=JSON.stringify(d);
  if(editExpId){const e=d.expenses.find(x=>x.id===editExpId);if(e){e.name=name;e.value=val;e.cat=cat;}}
  else d.expenses.push({id:Date.now(),name,value:val,cat,paid:false});
  setMD(cy,cm,d); closeSheet('expSheet');
  document.getElementById('expName').value=''; document.getElementById('expVal').value='';
  renderHome();
  if(!editExpId)pushUndo('"'+name+'" adicionado',()=>{setMD(cy,cm,JSON.parse(snap));renderHome();});
}
function saveFix(){
  const name=document.getElementById('fixName').value.trim(),val=parseFloat(document.getElementById('fixVal').value);
  if(!name||isNaN(val)||val<=0)return;
  const fx=getFixed(),snap=JSON.stringify(fx); fx.push({id:Date.now(),name,value:val}); setFixed(fx);
  closeSheet('fixSheet'); document.getElementById('fixName').value=''; document.getElementById('fixVal').value='';
  renderHomeList(); pushUndo('"'+name+'" adicionado aos fixos',()=>{setFixed(JSON.parse(snap));renderHomeList();});
}
function saveCard(){
  const name=document.getElementById('cName').value.trim(),total=parseFloat(document.getElementById('cTotal').value),inst=parseInt(document.getElementById('cInstalls').value);
  if(!name||isNaN(total)||isNaN(inst)||inst<1)return;
  const c=getCards(); c.push({name,total,installs:inst}); setCards(c);
  closeSheet('cardSheet'); document.getElementById('cName').value=''; document.getElementById('cTotal').value=''; document.getElementById('cInstalls').value='';
  renderCards();
}
function saveSal(){
  const v=parseFloat(document.getElementById('salVal').value); if(isNaN(v)||v<0)return;
  const d=getMD(cy,cm); d.salary=v; setMD(cy,cm,d); closeSheet('salSheet'); renderHome();
}


// WEBAUTHN / FACE ID
const RP_ID = location.hostname || 'localhost';
const RP_NAME = 'Minhas Dividas';

function b64url(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function fromB64url(s){ s=s.replace(/-/g,'+').replace(/_/g,'/'); return Uint8Array.from(atob(s),c=>c.charCodeAt(0)); }
function getCredId(){ return localStorage.getItem('faceCredId'); }
function saveCredId(id){ localStorage.setItem('faceCredId', id); }

async function doRegister(){
  const err=document.getElementById('lockErr'); err.textContent='';
  try {
    const challenge=crypto.getRandomValues(new Uint8Array(32));
    const userId=crypto.getRandomValues(new Uint8Array(16));
    const cred=await navigator.credentials.create({ publicKey:{
      challenge, rp:{id:RP_ID,name:RP_NAME}, user:{id:userId,name:'usuario',displayName:'Usuaria'},
      pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
      authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},
      timeout:60000, attestation:'none'
    }});
    saveCredId(b64url(cred.rawId));
    unlock();
  } catch(e) { err.textContent='Erro ao cadastrar: '+e.message; }
}

async function doAuth(){
  const err=document.getElementById('lockErr'); err.textContent='';
  const credId=getCredId();
  if(!credId){
    document.getElementById('lockBtn').style.display='none';
    document.getElementById('registerBtn').style.display='flex';
    document.getElementById('lockSub').textContent='Primeiro acesso: cadastre seu Face ID para proteger o app.';
    return;
  }
  try {
    const challenge=crypto.getRandomValues(new Uint8Array(32));
    await navigator.credentials.get({ publicKey:{
      challenge, rpId:RP_ID, allowCredentials:[{type:'public-key',id:fromB64url(credId)}],
      userVerification:'required', timeout:60000
    }});
    unlock();
  } catch(e) {
    err.textContent = e.name==='NotAllowedError' ? 'Face ID nao reconhecido.' : 'Erro: '+e.message;
  }
}

function unlock(){ document.getElementById('lockScreen').classList.add('hidden'); }

(function initAuth(){
  if(!window.PublicKeyCredential){ unlock(); return; }
  const credId=getCredId();
  if(!credId){
    document.getElementById('lockBtn').style.display='none';
    document.getElementById('registerBtn').style.display='flex';
    document.getElementById('lockSub').textContent='Primeiro acesso: cadastre seu Face ID para proteger o app.';
  }
})();

initPickers();
</script>
